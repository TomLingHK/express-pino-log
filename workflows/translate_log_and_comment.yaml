name: Translate Log and Comment

on:
  issues:
    types: [opened]

jobs:
  process-attachment:
    runs-on: arc-runner-set
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Log URL
        id: extract_url
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            // Look for a markdown link to a .txt file starting with log_
            const regex = /https:\/\/github\.com\/[^\s)]+\/log_[^\s)]+\.txt/g;
            const match = body.match(regex);
            if (match) {
              core.setOutput('url', match[0]);
              core.info(`Found log file: ${match[0]}`);
            } else {
              core.setFailed('No log_*.txt file found in issue description.');
            }

      - name: Download Log File
        run: |
          curl -L "${{ steps.extract_url.outputs.url }}" -o input_log.txt

      - name: Run JS Processor
        run: |
          # Ensure your script is in the repo
          # .github/scripts/logToCypress.js
          node logToCypress.js input_log.txt issue_"${{ github.event.issue.number }}".cy.js

      - name: Upload Result Artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-log-${{ github.event.issue.number }}
          path: issue_"${{ github.event.issue.number }}".cy.js
          retention-days: 7

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Log file processed! You can download the results from the **Artifacts** section of the [Workflow Run](${artifactUrl}).`
            })