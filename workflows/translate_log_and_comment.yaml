name: Translate Log and Comment

on:
  issues:
    types: [opened, edited]

jobs:
  process-attachment:
    runs-on: arc-runner-set
    permissions:
      issues: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Inline Log
        id: extract_log
        uses: actions/github-script@v7
        with:
          script: |
            const action = context.payload.action;
            const body = context.payload.issue.body || '';

            console.log('Action:', action);
            console.log('Issue body length:', body.length);

            if (action === 'edited') {
              const changes = context.payload.changes || {};
              if (!changes.body) {
                core.info('Issue body not changed; skipping workflow.');
                return;
              }
            }

            // Check for inline logs in code block (```logs or ```txt)
            const codeBlockMatch = body.match(/```(?:logs?|txt)?\n([\s\S]*?)\n```/i);
            if (codeBlockMatch) {
              core.setOutput('inline_logs', codeBlockMatch[1]);
              core.setOutput('source', 'inline');
              core.info('Found inline logs in code block');
              return;
            }

            core.setFailed('No logs found. Please provide inline logs in a code block: ```logs\n[log content]\n```');


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Process Logs
        if: ${{ steps.extract_log.outputs.inline_logs != '' }}
        run: |
          echo "${{ steps.extract_log.outputs.inline_logs }}" > input_log.txt
          echo "Processing logs ($(wc -l < input_log.txt) lines)..."
          node .github/scripts/logToCypress.js input_log.txt issue_${{ github.event.issue.number }}.cy.js

      - name: Upload Result Artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-log-${{ github.event.issue.number }}
          path: issue_${{ github.event.issue.number }}.cy.js
          retention-days: 7

      - name: Comment on Issue
        if: ${{ steps.extract_log.outputs.inline_logs != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Cypress test generated! Download the result from the **Artifacts** section of the [Workflow Run](${artifactUrl}).`
            })